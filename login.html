<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <style>

    /* ── Reset ── */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ── Page background ── */
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* ── Centered login card ── */
    .card {
      background: #ffffff;
      width: 100%;
      max-width: 400px;
      padding: 44px 40px 36px;
      border-radius: 20px;
      box-shadow: 0 24px 64px rgba(0, 0, 0, 0.18);
    }

    /* Card header */
    .card-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .card-header .icon {
      font-size: 2.4rem;
      margin-bottom: 10px;
    }

    .card-header h1 {
      font-size: 1.6rem;
      color: #1e1b4b;
      margin-bottom: 4px;
    }

    .card-header p {
      font-size: 0.875rem;
      color: #6b7280;
    }

    /* ── Input fields ── */
    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #374151;
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid #e5e7eb;
      border-radius: 10px;
      font-size: 0.95rem;
      color: #111827;
      background: #f9fafb;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }

    /* Highlight active input */
    .field input:focus {
      border-color: #6366f1;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
    }

    /* ── Login button ── */
    .btn {
      width: 100%;
      padding: 13px;
      margin-top: 6px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      /* Smooth hover transition */
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
    }

    /* Hover effect */
    .btn:hover {
      opacity: 0.9;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(99, 102, 241, 0.45);
    }

    .btn:active {
      transform: translateY(0);
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.4);
    }

    /* ── Message area ── */
    .msg {
      display: none;          /* hidden until needed */
      margin-top: 18px;
      padding: 11px 16px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      text-align: center;
    }

    /* Error style */
    .msg.error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    /* Success style */
    .msg.success {
      background: #f0fdf4;
      color: #15803d;
      border: 1px solid #bbf7d0;
    }

  </style>
</head>
<body>

  <!-- ── Login card ── -->
  <div class="card">

    <div class="card-header">
      <div class="icon">🔐</div>
      <h1>Welcome Back</h1>
      <p>Sign in to your account</p>
    </div>

    <!-- Username field -->
    <div class="field">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter your username" />
    </div>

    <!-- Password field -->
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" />
    </div>

    <!-- Submit button -->
    <button class="btn" onclick="handleLogin()">Login</button>

    <!-- Feedback message (error or success) -->
    <div class="msg" id="msg"></div>

  </div>

  <script>

    // Hardcoded credentials
    const VALID_USER = 'admin';
    const VALID_PASS = '1234';

    function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      const msg      = document.getElementById('msg');

      // Reset message state
      msg.style.display = 'none';
      msg.className = 'msg';

      // Validate: fields must not be empty
      if (!username || !password) {
        showMsg('error', '⚠ Please fill in both fields.');
        return;
      }

      // Check against hardcoded credentials
      if (username === VALID_USER && password === VALID_PASS) {
        showMsg('success', '✓ Login successful! Welcome, ' + username + '.');
      } else {
        showMsg('error', '✗ Invalid username or password. Please try again.');
      }
    }

    // Helper: show a typed message
    function showMsg(type, text) {
      const msg = document.getElementById('msg');
      msg.className  = 'msg ' + type;
      msg.textContent = text;
      msg.style.display = 'block';
    }

    // Allow Enter key to submit
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') handleLogin();
    });

  </script>

</body>
</html>
